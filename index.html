<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Rock Paper Scissors</title>
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Rock Paper Scissors</h1>

    <div class="round-choices">
      <p class="round-choice">
        Player choice: <span id="player-choice"></span>
      </p>
      <p class="round-result"></p>
      <p class="round-choice">
        computer choice: <span id="computer-choice"></span>
      </p>
    </div>

    <div class="game">
      <button id="rock">rock</button>
      <button id="paper">paper</button>
      <button id="scissors">scissors</button>
    </div>

    <div class="score">
      <p class="score-board">
        Player score: <span id="player-score"></span>
      </p>
      <p class="round-result"></p>
        computer score: <span id="computer-score"></span>
      </p>
    </div>

    <p id="final-result"></p>
    <button class="reset"></button>

 
  </body>
</html>
